name: Siteyi yayınla

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: Yazı listesini (posts.json) üret
        run: python3 scripts/generate_index.py

      - name: Sayfa yapısını hazırla
        uses: actions/configure-pages@v5

      - name: Dosyaları paketle
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: GitHub Pages'e yayınla
        id: deployment
        uses: actions/deploy-pages@v4
